<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - SmartBus</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            background: radial-gradient(circle at 20% 20%, #1f3b67, #0b1320 60%);
            font-family: "Inter", sans-serif;
            color: #e9f0ff;
        }
        .login-card {
            width: min(420px, 92vw);
            padding: 28px;
            border-radius: 22px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(12px);
            box-shadow: 0 30px 60px -30px rgba(0, 0, 0, 0.55);
        }
        .form-control {
            border-radius: 12px;
            padding: 12px 14px;
        }
        .btn-login {
            border-radius: 12px;
            padding: 12px;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h3 class="mb-2"><i class="fas fa-shield-halved me-2"></i>Admin Login</h3>
        <p class="text-light-emphasis mb-4">SmartBus administration portal</p>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" class="form-control" name="username" required>
            </div>
            <div class="mb-4">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 btn-login">Login</button>
        </form>
    </div>
</body>
</html>
